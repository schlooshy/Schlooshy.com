<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50% Chance Game</title>
    <link rel="stylesheet" href="50percentgame.css">
    <link rel="icon" href="/50percentgame/images/spadesicon.png" type="image/png">
</head>
<body>
    <h1 id="title">The 50% chance game</h1>
    <div id="balancediv">
        <p id="balancetitle">User Balance</p>
        <p id="balance">0</p>
    </div>
    <br>
    <br>
    <div id="enemybalancediv">
        <p id="enemybalancetitle">Enemy Balance</p>
        <p id="enemybalance">0</p>
    </div>
    <br>
    <br>
    <button id="button1" disabled>1</button>
    <button id="button2" disabled>2</button>
    <p id="fail"></p>
    <p id="success"></p>
    <div id="inputdiv">
        <h1 id="inputtitle"> Bet </h1>
        <input type="number" id="input"></input>
        
    </div>
    <br>
    <br>
    <div id="dyslexia" onclick="dyslexiamode()">
        <button id="dyslexiabutton">OpenDyslexic Font</button>
    </div>
    <script src="50percentgame.js"></script>
</body>
</html>
